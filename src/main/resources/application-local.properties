# ???????????????????????????????????????????????????????????????
#  LOCAL Profile ? File-based H2 (PERSISTS across restarts)
#  Data stored at: ~/insurancedb.mv.db (your home directory)
#  H2 Console: http://localhost:8080/h2-console
#    JDBC URL:  jdbc:h2:file:~/insurancedb
#    Username:  sa  |  Password: (blank)
#
#  To switch to MySQL: set SPRING_PROFILES_ACTIVE=mysql
# ???????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:file:${user.home}/insurancedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update = schema is kept, data is NEVER dropped on restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Web Console ? http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Hikari pool ? conservative settings for local file-based H2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000