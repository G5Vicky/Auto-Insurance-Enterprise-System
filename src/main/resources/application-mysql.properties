# ═══════════════════════════════════════════════════════════════
#  MySQL Profile  —  used locally and on production server
#  DB auto-created if it does not exist (createDatabaseIfNotExist=true)
#
#  ⚠ IF DB ALREADY EXISTS FROM A PREVIOUS RUN:
#    The app will connect and skip seeding automatically.
#    To wipe demo data and re-seed fresh:
#      mysql -u root -p -e "DROP DATABASE insurance_db;"
#    Then restart the app — it will recreate the DB + seed.
#
#  ⚠ IF YOU CHANGE CREDENTIALS: update username + password below.
# ═══════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# update = add new columns/tables if missing; never drops existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
