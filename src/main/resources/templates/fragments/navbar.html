<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>
<aside th:fragment="sidebar" class="sidebar">
  <a href="/dashboard" class="sb-brand">
    <div class="sb-brand-icon"><i class="bi bi-shield-check" style="color:#fff;font-size:18px"></i></div>
    <div>
      <div class="sb-brand-name">Insure<span>Track</span></div>
      <div class="sb-version">ENTERPRISE v2.1</div>
    </div>
  </a>

  <div class="sb-section">
    <div class="sb-section-label">Main</div>
    <a th:href="@{/dashboard}" class="sb-item" th:classappend="${activePage=='dashboard'}?' active':''">
      <i class="sb-icon bi bi-speedometer2"></i><span>Dashboard</span>
    </a>
    <a th:href="@{/policies}" class="sb-item" th:classappend="${activePage=='policies'}?' active':''">
      <i class="sb-icon bi bi-file-earmark-text"></i><span>Policies</span>
    </a>
    <a th:href="@{/payments}" class="sb-item" th:classappend="${activePage=='payments'}?' active':''">
      <i class="sb-icon bi bi-credit-card"></i><span>Payments</span>
    </a>
    <a th:href="@{/notifications}" class="sb-item" th:classappend="${activePage=='notifications'}?' active':''">
      <i class="sb-icon bi bi-bell"></i><span>Notifications</span>
      <span class="sb-badge" id="notifBadge" style="display:none">0</span>
    </a>
  </div>

  <!-- Premium Payments Section (NEW) -->
  <div class="sb-section">
    <div class="sb-section-label">Premium</div>
    <a th:href="@{/premium}" class="sb-item" th:classappend="${activePage=='premium'}?' active':''">
      <i class="sb-icon bi bi-calendar-check"></i><span>Current Month Dues</span>
    </a>
    <a th:href="@{/premium/advance}" class="sb-item" th:classappend="${activePage=='premium-advance'}?' active':''">
      <i class="sb-icon bi bi-calendar-plus"></i><span>Advance Payment</span>
    </a>
    <a th:href="@{/premium/pay}" class="sb-item" th:classappend="${activePage=='premium-pay'}?' active':''">
      <i class="sb-icon bi bi-send"></i><span>Pay Premium</span>
    </a>
  </div>

  <div class="sb-section">
    <div class="sb-section-label">Reports</div>
    <a th:href="@{/reports/expiry}" class="sb-item" th:classappend="${activePage=='reports'}?' active':''">
      <i class="sb-icon bi bi-bar-chart-line"></i><span>Reports</span>
    </a>
    <div class="sb-submenu" th:if="${activePage=='reports'}">
      <a th:href="@{/reports/expiry}"  class="sb-item" th:classappend="${activeReport=='expiry'}?' active':''">
        <i class="sb-icon bi bi-calendar-x"></i><span>Expiring</span></a>
      <a th:href="@{/reports/revenue}" class="sb-item" th:classappend="${activeReport=='revenue'}?' active':''">
        <i class="sb-icon bi bi-currency-rupee"></i><span>Revenue</span></a>
      <a th:href="@{/reports/failed}"  class="sb-item" th:classappend="${activeReport=='failed'}?' active':''">
        <i class="sb-icon bi bi-exclamation-triangle"></i><span>Failed</span></a>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-section-label">Tools</div>
    <a th:href="@{/calculator}" class="sb-item" th:classappend="${activePage=='calculator'}?' active':''">
      <i class="sb-icon bi bi-calculator"></i><span>Premium Calc</span>
    </a>
    <a href="/portal" target="_blank" class="sb-item">
      <i class="sb-icon bi bi-person-circle"></i><span>Customer Portal</span>
      <i class="bi bi-box-arrow-up-right" style="font-size:10px;margin-left:auto;color:var(--text-d)"></i>
    </a>
  </div>

  <div class="sb-section" sec:authorize="hasAuthority('ROLE_ADMIN')">
    <div class="sb-section-label">Admin</div>
    <a th:href="@{/admin/users}" class="sb-item" th:classappend="${activePage=='admin'}?' active':''">
      <i class="sb-icon bi bi-people"></i><span>User Management</span>
    </a>
  </div>

  <div class="sb-section">
    <div class="sb-section-label">Quick Actions</div>
    <a th:href="@{/policies/add}" class="sb-item">
      <i class="sb-icon bi bi-plus-circle"></i><span>New Policy</span>
    </a>
    <a th:href="@{/premium/pay}" class="sb-item">
      <i class="sb-icon bi bi-send"></i><span>Pay Premium</span>
    </a>
  </div>

  <div class="sb-bottom">
    <div style="padding:8px 12px;font-size:12px;color:var(--text-m);display:flex;align-items:center;gap:8px">
      <i class="bi bi-person-circle" style="font-size:16px"></i>
      <div>
        <div sec:authentication="name" style="font-weight:600;font-size:12px"></div>
        <div sec:authorize="hasAuthority('ROLE_ADMIN')" style="font-size:10px;color:var(--primary)">Administrator</div>
        <div sec:authorize="hasAuthority('ROLE_USER')" style="font-size:10px;color:var(--text-d)">Staff</div>
      </div>
      <form th:action="@{/logout}" method="post" style="margin-left:auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" style="background:none;border:none;color:var(--text-d);font-size:14px;cursor:pointer;padding:4px" title="Logout">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </form>
    </div>
  </div>
</aside>
</body>
</html>
