<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Premium Calculator — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Premium Calculator')}"></div>
    <div class="main-content">

      <div class="page-header mb-4">
        <div>
          <h1 class="page-title">Premium Calculator</h1>
          <p class="page-sub">Real-time insurance premium estimation with GST</p>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">

        <!-- Input Panel -->
        <div class="card">
          <div class="card-header"><h3 class="card-title"><i class="bi bi-sliders"></i> Vehicle & Coverage Details</h3></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Coverage Type *</label>
              <select id="coverageType" class="form-control" onchange="calculate()">
                <option value="Comprehensive">Comprehensive</option>
                <option value="Third Party">Third Party Liability</option>
                <option value="Own Damage">Own Damage Only</option>
                <option value="Zero Dep">Zero Depreciation</option>
                <option value="EV Comprehensive">EV Comprehensive</option>
                <option value="Commercial">Commercial Vehicle</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Insured Declared Value (IDV) — ₹ *</label>
              <input type="number" id="idv" class="form-control" value="500000" min="50000" max="10000000" step="10000" oninput="calculate()"/>
            </div>
            <div class="form-group">
              <label class="form-label">Vehicle Age (years) *</label>
              <input type="range" id="vehicleAge" class="form-range" min="0" max="15" value="2" oninput="updateAgeLabel();calculate()"/>
              <div style="display:flex;justify-content:space-between;margin-top:4px">
                <span class="text-muted" style="font-size:12px">New (0y)</span>
                <span id="ageLabel" style="color:var(--primary);font-weight:600;font-size:14px">2 years</span>
                <span class="text-muted" style="font-size:12px">15+ years</span>
              </div>
            </div>

            <div class="form-label mb-2" style="margin-bottom:8px">Add-On Covers</div>
            <div class="addon-grid">
              <label class="addon-card">
                <input type="checkbox" id="zeroDep" onchange="calculate()"/>
                <div class="addon-body">
                  <i class="bi bi-shield-plus"></i>
                  <span>Zero Depreciation</span>
                  <small>+15% premium</small>
                </div>
              </label>
              <label class="addon-card">
                <input type="checkbox" id="roadside" onchange="calculate()"/>
                <div class="addon-body">
                  <i class="bi bi-truck"></i>
                  <span>Roadside Assist</span>
                  <small>+₹750 flat</small>
                </div>
              </label>
              <label class="addon-card">
                <input type="checkbox" id="engine" onchange="calculate()"/>
                <div class="addon-body">
                  <i class="bi bi-gear-wide-connected"></i>
                  <span>Engine Protect</span>
                  <small>+10% premium</small>
                </div>
              </label>
            </div>

            <div class="form-group" style="margin-top:20px">
              <label class="form-label">No Claim Bonus (NCB) %</label>
              <select id="ncbPercent" class="form-control" onchange="calculate()">
                <option value="0">0% — First Year / Claim Made</option>
                <option value="20">20% — 1 Year No Claim</option>
                <option value="25">25% — 2 Years No Claim</option>
                <option value="35">35% — 3 Years No Claim</option>
                <option value="45">45% — 4 Years No Claim</option>
                <option value="50">50% — 5+ Years No Claim</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Results Panel -->
        <div>
          <div class="card mb-4" id="resultCard">
            <div class="card-header"><h3 class="card-title"><i class="bi bi-receipt"></i> Premium Breakdown</h3></div>
            <div class="card-body" id="resultBody">
              <div style="text-align:center;padding:32px;color:var(--text-d)">
                <i class="bi bi-calculator" style="font-size:40px;margin-bottom:12px;display:block"></i>
                Adjust the inputs to calculate premium
              </div>
            </div>
          </div>

          <div class="card" id="adviceCard" style="display:none">
            <div class="card-header"><h3 class="card-title"><i class="bi bi-lightbulb"></i> Smart Recommendations</h3></div>
            <div class="card-body" id="adviceBody"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: mobileOverlay}"></div>
<script th:src="@{/js/app.js}"></script>
<script>
const fmt = v => '₹' + Number(v).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});

function updateAgeLabel() {
  const v = document.getElementById('vehicleAge').value;
  document.getElementById('ageLabel').textContent = v == 0 ? 'New vehicle' : v + ' year' + (v>1?'s':'');
}

async function calculate() {
  const p = new URLSearchParams({
    coverageType: document.getElementById('coverageType').value,
    vehicleAge:   document.getElementById('vehicleAge').value,
    idv:          document.getElementById('idv').value,
    zeroDep:      document.getElementById('zeroDep').checked,
    roadside:     document.getElementById('roadside').checked,
    engine:       document.getElementById('engine').checked,
    ncbPercent:   document.getElementById('ncbPercent').value,
  });
  try {
    const r = await fetch('/calculator/api/calculate?' + p);
    const d = await r.json();
    renderResult(d);
    renderAdvice(d);
  } catch(e) { console.error(e); }
}

function renderResult(d) {
  const html = `
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:11px;color:var(--text-d);text-transform:uppercase;letter-spacing:1px">Annual Total Premium</div>
      <div style="font-size:42px;font-weight:700;background:linear-gradient(135deg,#3b82f6,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${fmt(d.totalPremium)}</div>
      <div style="color:var(--text-m);font-size:13px">incl. 18% GST (${fmt(d.gst)}) &nbsp;|&nbsp; Monthly ~${fmt(d.monthlyCost)}</div>
    </div>
    <div class="calc-breakdown">
      <div class="calc-row"><span>IDV (Insured Value)</span><span>${fmt(d.idv)}</span></div>
      <div class="calc-row"><span>Base Premium</span><span>${fmt(d.basePremium)}</span></div>
      <div class="calc-row" style="${d.addons>0?'':'opacity:.4'}"><span>Add-On Covers</span><span>+ ${fmt(d.addons)}</span></div>
      <div class="calc-row ncb-row" style="${d.ncbDiscount>0?'':'opacity:.4'}"><span>NCB Discount</span><span style="color:var(--success)">− ${fmt(d.ncbDiscount)}</span></div>
      <div class="calc-row sub"><span>Net Premium</span><span>${fmt(d.netPremium)}</span></div>
      <div class="calc-row"><span>GST (18%)</span><span>+ ${fmt(d.gst)}</span></div>
      <div class="calc-row total"><span>Total Payable</span><span style="color:var(--primary)">${fmt(d.totalPremium)}</span></div>
    </div>`;
  document.getElementById('resultBody').innerHTML = html;
}

function renderAdvice(d) {
  const tips = [];
  if (!document.getElementById('zeroDep').checked && d.totalPremium < 30000)
    tips.push('<i class="bi bi-shield-plus text-warning"></i> <b>Add Zero Depreciation</b> — protects full part value without deduction at claim time.');
  if (parseInt(document.getElementById('ncbPercent').value) === 0)
    tips.push('<i class="bi bi-trophy text-success"></i> <b>Build your NCB</b> — avoid small claims to earn up to 50% discount in 5 years.');
  if (!document.getElementById('roadside').checked)
    tips.push('<i class="bi bi-truck text-info"></i> <b>Roadside Assistance</b> adds only ₹750 for nationwide 24×7 breakdown support.');
  if (parseInt(document.getElementById('vehicleAge').value) > 8)
    tips.push('<i class="bi bi-exclamation-triangle text-warning"></i> <b>Old vehicle</b> — IDV reduces significantly. Consider Third Party only to save on premium.');

  const card = document.getElementById('adviceCard');
  if (tips.length === 0) { card.style.display='none'; return; }
  card.style.display='block';
  document.getElementById('adviceBody').innerHTML =
    tips.map(t => `<div class="advice-tip">${t}</div>`).join('');
}

// Init on load
window.addEventListener('load', calculate);
</script>
</body>
</html>
