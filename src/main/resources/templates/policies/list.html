<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Policies — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Policies')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">

      <div th:if="${successMsg}" class="alert alert-success alert-dismissible mb-4">
        <i class="bi bi-check-circle"></i><span th:text="${successMsg}"></span>
        <button class="alert-close" data-dismiss-alert>&#x2715;</button>
      </div>

      <div class="page-header mb-4">
        <div>
          <h1 class="page-title">Policy Management</h1>
          <p class="page-sub" th:text="'Total ' + ${totalCount} + ' policies in system'"></p>
        </div>
        <a th:href="@{/policies/add}" class="btn btn-primary">
          <i class="bi bi-plus-circle"></i> New Policy
        </a>
      </div>

      <!-- Status Quick-Filter Pills -->
      <div class="status-pills mb-3">
        <a th:href="@{/policies}" class="pill" th:classappend="${appliedStatus==null and searchQuery==null and searchId==null}?' active':''">All</a>
        <a th:each="s : ${statuses}" th:href="@{/policies(status=${s.name()})}" class="pill"
           th:classappend="${appliedStatus==s}?' active':''"
           th:text="${s.label}"></a>
      </div>

      <!-- Search bar -->
      <div class="filter-bar mb-4">
        <form th:action="@{/policies}" method="get" class="filter-form">
          <div class="filter-group">
            <i class="bi bi-search filter-icon"></i>
            <input type="text" name="q" class="form-control filter-input"
                   placeholder="Search by name, vehicle, holder..."
                   th:value="${searchQuery}"/>
          </div>
          <div class="filter-sep">or</div>
          <div class="filter-group" style="flex:0 0 200px">
            <i class="bi bi-hash filter-icon"></i>
            <input type="number" name="id" class="form-control filter-input"
                   placeholder="Policy ID (e.g. 3)"
                   th:value="${searchId}" min="1"/>
          </div>
          <button type="submit" class="btn btn-primary">Search</button>
          <a th:href="@{/policies}" class="btn btn-ghost">Clear</a>
        </form>
      </div>

      <!-- Active filter indicator -->
      <div th:if="${searchId!=null}" class="alert alert-info mb-3" style="padding:10px 16px">
        <i class="bi bi-hash"></i> Showing results for Policy ID <b th:text="'#' + ${searchId}"></b>
        &nbsp;<a th:href="@{/policies}" class="link-primary">Clear filter</a>
      </div>
      <div th:if="${searchQuery!=null}" class="alert alert-info mb-3" style="padding:10px 16px">
        <i class="bi bi-search"></i> Results for "<b th:text="${searchQuery}"></b>"
        — <span th:text="${policies.size()}"></span> found
        &nbsp;<a th:href="@{/policies}" class="link-primary">Clear</a>
      </div>
      <div th:if="${appliedStatus!=null}" class="alert alert-info mb-3" style="padding:10px 16px">
        <i class="bi bi-funnel"></i> Filtering by status: <b th:text="${appliedStatus.label}"></b>
        — <span th:text="${policies.size()}"></span> policies
        &nbsp;<a th:href="@{/policies}" class="link-primary">Clear</a>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>Policy Name</th><th>Holder</th>
              <th>Vehicle</th><th>Coverage</th><th>Premium</th>
              <th>End Date</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody>
            <tr th:each="p : ${policies}" class="table-row-hover">
              <td><span class="mono text-muted" th:text="'#' + ${p.policyId}"></span></td>
              <td>
                <a th:href="@{/policies/{id}(id=${p.policyId})}" class="link-primary fw-600"
                   th:text="${p.policyName}"></a>
              </td>
              <td>
                <div th:text="${p.policyHolderName}"></div>
                <div class="text-sm text-muted" th:text="${p.holderPhone}"></div>
              </td>
              <td>
                <div th:text="${p.vehicleModel}"></div>
                <div class="mono text-muted text-sm" th:text="${p.vehicleNumber}"></div>
              </td>
              <td th:text="${p.coverageType}"></td>
              <td>
                <span class="fw-600" th:text="'₹' + ${#numbers.formatDecimal(p.policyAmount,1,'COMMA',0,'POINT')}"></span>
              </td>
              <td>
                <span th:text="${p.policyEndDate}" class="text-sm"></span>
              </td>
              <td>
                <span class="badge"
                      th:classappend="${p.policyStatus.name()=='ACTIVE'}?' badge-success':
                                       (${p.policyStatus.name()=='EXPIRED'}?' badge-danger':
                                       (${p.policyStatus.name()=='CANCELLED'}?' badge-danger':
                                       (${p.policyStatus.name()=='RENEWED'}?' badge-info':
                                       (${p.policyStatus.name()=='SUSPENDED'}?' badge-warning':
                                       ' badge-secondary'))))"
                      th:text="${p.policyStatus.label}"></span>
              </td>
              <td>
                <div style="display:flex;gap:6px">
                  <a th:href="@{/policies/{id}(id=${p.policyId})}" class="btn btn-sm btn-ghost" title="View">
                    <i class="bi bi-eye"></i>
                  </a>
                  <a th:href="@{/policies/{id}/edit(id=${p.policyId})}" class="btn btn-sm btn-ghost" title="Edit">
                    <i class="bi bi-pencil"></i>
                  </a>
                  <a th:href="@{/payments/byPolicy/{id}(id=${p.policyId})}" class="btn btn-sm btn-ghost" title="Payments">
                    <i class="bi bi-credit-card"></i>
                  </a>
                </div>
              </td>
            </tr>
            <tr th:if="${policies.isEmpty()}">
              <td colspan="9">
                <div class="empty-state">
                  <div class="empty-icon"><i class="bi bi-file-earmark-text"></i></div>
                  <div class="empty-title">No Policies Found</div>
                  <div class="empty-sub">Try adjusting your search or filter criteria</div>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<div th:replace="~{fragments/footer :: mobileOverlay}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
