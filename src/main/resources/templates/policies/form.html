<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${mode == 'add'} ? 'New Policy' : 'Edit Policy'">Policy Form &mdash; InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>

<style>
@media(max-width:992px){
  #mobileMenuBtn{display:flex!important}
  #sidebarOverlay{display:block!important;opacity:0;pointer-events:none;transition:opacity .25s}
  #sidebarOverlay.show{opacity:1;pointer-events:all}
}
</style>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar(${mode == 'add'} ? 'New Policy' : 'Edit Policy')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">

      <a th:href="@{/policies}" class="back-link"><i class="bi bi-arrow-left"></i> Back to Policies</a>

      <div class="card" style="max-width:860px;margin:0 auto">
        <div class="card-header">
          <div class="ch-icon"
               th:style="${mode == 'add'} ? 'background:rgba(59,130,246,.12);color:#3b82f6' : 'background:rgba(245,158,11,.12);color:#f59e0b'">
            <i class="bi" th:classappend="${mode == 'add'} ? 'bi-plus-lg' : 'bi-pencil'"></i>
          </div>
          <span th:text="${mode == 'add'} ? 'Create New Policy' : 'Edit Policy: ' + ${policy.policyName}"></span>
        </div>
        <div class="card-body">
          <form th:action="${mode == 'add'} ? @{/policies/add} : @{/policies/{id}/edit(id=${policy.policyId})}"
                th:object="${policy}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Policy Info -->
            <div class="form-section">
              <div class="form-section-title"><i class="bi bi-info-circle"></i> Policy Information</div>
              <div class="form-grid form-grid-2">
                <div class="form-field">
                  <label class="form-label">Policy Name <span class="req">*</span></label>
                  <input type="text" class="form-control" th:field="*{policyName}"
                         th:classappend="${#fields.hasErrors('policyName')} ? ' is-invalid'"
                         placeholder="e.g. Comprehensive Auto Shield"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('policyName')}" th:errors="*{policyName}"></div>
                </div>
                <div class="form-field">
                  <label class="form-label">Status</label>
                  <select class="form-select" th:field="*{policyStatus}">
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
                  </select>
                </div>
                <div class="form-field">
                  <label class="form-label">Annual Premium (₹) <span class="req">*</span></label>
                  <input type="number" step="0.01" min="1" class="form-control" th:field="*{policyAmount}"
                         th:classappend="${#fields.hasErrors('policyAmount')} ? ' is-invalid'"
                         placeholder="e.g. 15000"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('policyAmount')}" th:errors="*{policyAmount}"></div>
                </div>
                <div class="form-field">
                  <label class="form-label">Coverage Type</label>
                  <select class="form-select" th:field="*{coverageType}">
                    <option value="">-- Select Coverage --</option>
                    <option value="Comprehensive">Comprehensive</option>
                    <option value="Third Party">Third Party Only</option>
                    <option value="Own Damage">Own Damage</option>
                    <option value="Zero Dep">Zero Depreciation</option>
                    <option value="Commercial">Commercial Vehicle</option>
                    <option value="EV Comprehensive">EV Comprehensive</option>
                  </select>
                </div>
                <div class="form-field">
                  <label class="form-label">Start Date <span class="req">*</span></label>
                  <input type="date" class="form-control" th:field="*{policyStartDate}"
                         th:classappend="${#fields.hasErrors('policyStartDate')} ? ' is-invalid'"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('policyStartDate')}" th:errors="*{policyStartDate}"></div>
                </div>
                <div class="form-field">
                  <label class="form-label">End Date <span class="req">*</span></label>
                  <input type="date" class="form-control" th:field="*{policyEndDate}"
                         th:classappend="${#fields.hasErrors('policyEndDate')} ? ' is-invalid'"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('policyEndDate')}" th:errors="*{policyEndDate}"></div>
                </div>
                <div class="form-field">
                  <label class="form-label">Deductible Amount (₹)</label>
                  <input type="number" step="0.01" class="form-control" th:field="*{deductibleAmount}" placeholder="e.g. 5000"/>
                </div>
              </div>
            </div>

            <!-- Holder Info -->
            <div class="form-section">
              <div class="form-section-title"><i class="bi bi-person"></i> Policy Holder</div>
              <div class="form-grid form-grid-2">
                <div class="form-field">
                  <label class="form-label">Full Name <span class="req">*</span></label>
                  <input type="text" class="form-control" th:field="*{policyHolderName}"
                         th:classappend="${#fields.hasErrors('policyHolderName')} ? ' is-invalid'"
                         placeholder="e.g. Ravi Kumar"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('policyHolderName')}" th:errors="*{policyHolderName}"></div>
                </div>
                <div class="form-field">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-control" th:field="*{holderPhone}" placeholder="10-digit mobile"/>
                </div>
                <div class="form-field">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control" th:field="*{holderEmail}"
                         th:classappend="${#fields.hasErrors('holderEmail')} ? ' is-invalid'"
                         placeholder="email@example.com"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('holderEmail')}" th:errors="*{holderEmail}"></div>
                </div>
              </div>
              <div class="form-field mt-2">
                <label class="form-label">Address</label>
                <textarea class="form-control" th:field="*{holderAddress}" rows="2"
                          placeholder="Full address"></textarea>
              </div>
            </div>

            <!-- Vehicle Info -->
            <div class="form-section">
              <div class="form-section-title"><i class="bi bi-car-front"></i> Vehicle Details</div>
              <div class="form-grid form-grid-3">
                <div class="form-field">
                  <label class="form-label">Registration Number</label>
                  <input type="text" class="form-control" th:field="*{vehicleNumber}" placeholder="e.g. MH02AB1234"/>
                </div>
                <div class="form-field">
                  <label class="form-label">Make &amp; Model</label>
                  <input type="text" class="form-control" th:field="*{vehicleModel}" placeholder="e.g. Honda City 2022"/>
                </div>
                <div class="form-field">
                  <label class="form-label">Year of Manufacture</label>
                  <input type="number" class="form-control" th:field="*{vehicleYear}" placeholder="e.g. 2022"/>
                </div>
              </div>
            </div>

            <!-- Premium Schedule (NEW) -->
            <div class="form-section">
              <div class="form-section-title"><i class="bi bi-calendar-check"></i> Premium Schedule</div>
              <div class="form-grid form-grid-2">
                <div class="form-field">
                  <label class="form-label">Monthly Premium Due Day</label>
                  <select class="form-select" th:field="*{premiumDayOfMonth}">
                    <option th:each="day : ${#numbers.sequence(1,28)}" th:value="${day}"
                            th:text="${day} + (${day == 1 || day == 21} ? 'st' : (${day == 2 || day == 22} ? 'nd' : (${day == 3 || day == 23} ? 'rd' : 'th'))) + ' of each month'"></option>
                  </select>
                  <div style="font-size:11px;color:var(--text-m);margin-top:4px">Day of month when premium is due (default: 26th)</div>
                </div>
                <div class="form-field">
                  <label class="form-label">Monthly Premium Amount (₹)</label>
                  <input type="number" step="0.01" min="1" class="form-control" th:field="*{monthlyPremium}"
                         placeholder="Leave blank to auto-calculate (Annual ÷ 12)"/>
                  <div style="font-size:11px;color:var(--text-m);margin-top:4px">Optional — auto-calculated from annual premium if left blank</div>
                </div>
              </div>
            </div>

            <div style="display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:20px">
              <a th:href="@{/policies}" class="btn btn-ghost">Cancel</a>
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-check-lg"></i>
                <span th:text="${mode == 'add'} ? 'Create Policy' : 'Save Changes'"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
