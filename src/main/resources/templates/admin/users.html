<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>User Management — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('User Management')}"></div>
    <div class="main-content">

      <!-- Flash -->
      <div th:if="${successMsg}" class="alert alert-success alert-dismissible mb-4">
        <i class="bi bi-check-circle"></i> <span th:text="${successMsg}"></span>
        <button class="alert-close" data-dismiss-alert>&#x2715;</button>
      </div>
      <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible mb-4">
        <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMsg}"></span>
        <button class="alert-close" data-dismiss-alert>&#x2715;</button>
      </div>

      <div class="page-header mb-4">
        <div>
          <h1 class="page-title">User Management</h1>
          <p class="page-sub">Manage system access credentials and roles</p>
        </div>
        <a th:href="@{/admin/users/add}" class="btn btn-primary">
          <i class="bi bi-person-plus"></i> Add User
        </a>
      </div>

      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><i class="bi bi-people"></i> System Users</h3>
          <span class="badge badge-info" th:text="${users.size()} + ' users'"></span>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>Username</th><th>Full Name</th><th>Email</th>
              <th>Role</th><th>Status</th><th>Created</th><th>Actions</th>
            </tr></thead>
            <tbody>
            <tr th:each="u : ${users}">
              <td><span class="mono" th:text="'#' + ${u.userId}"></span></td>
              <td><span class="fw-600" th:text="${u.username}"></span></td>
              <td th:text="${u.fullName}"></td>
              <td><span class="text-muted" th:text="${u.email}"></span></td>
              <td>
                <span class="badge" th:classappend="${u.role.name()=='ROLE_ADMIN'}?'badge-warning':'badge-info'"
                      th:text="${u.role.name()=='ROLE_ADMIN'}?'Admin':'Staff'"></span>
              </td>
              <td>
                <span class="badge" th:classappend="${u.enabled}?'badge-success':'badge-danger'"
                      th:text="${u.enabled}?'Active':'Disabled'"></span>
              </td>
              <td><span class="text-muted" th:text="${u.createdAt != null ? u.createdAt.toLocalDate().toString() : '—'}"></span></td>
              <td>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  <!-- Toggle enable/disable — prevent disabling yourself -->
                  <form th:action="@{/admin/users/{id}/toggle(id=${u.userId})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm"
                            th:class="${u.enabled}?'btn btn-sm btn-warning':'btn btn-sm btn-success'"
                            th:text="${u.enabled}?'Disable':'Enable'"></button>
                  </form>
                  <!-- Reset password modal trigger -->
                  <button class="btn btn-sm btn-ghost" th:data-uid="${u.userId}"
                          th:data-uname="${u.username}" onclick="openReset(this)">
                    <i class="bi bi-key"></i> Reset PW
                  </button>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title"><i class="bi bi-key"></i> Reset Password</h3>
      <button class="modal-close" onclick="closeReset()">&#x2715;</button>
    </div>
    <form id="resetForm" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label">New Password for <b id="resetUsername"></b></label>
        <input type="password" name="newPassword" class="form-control" placeholder="Enter new password" minlength="6" required/>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button type="button" class="btn btn-ghost" onclick="closeReset()">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Reset</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/footer :: mobileOverlay}"></div>
<script th:src="@{/js/app.js}"></script>
<script>
function openReset(btn) {
  document.getElementById('resetUsername').textContent = btn.dataset.uname;
  document.getElementById('resetForm').action = '/admin/users/' + btn.dataset.uid + '/resetpw';
  document.getElementById('resetModal').classList.add('open');
}
function closeReset() { document.getElementById('resetModal').classList.remove('open'); }
</script>
</body>
</html>
