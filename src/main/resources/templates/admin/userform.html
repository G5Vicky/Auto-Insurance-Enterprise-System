<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Add User — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Add User')}"></div>
    <div class="main-content">
      <div class="page-header mb-4">
        <div>
          <h1 class="page-title">Add New User</h1>
          <p class="page-sub">Create a new system user account</p>
        </div>
        <a th:href="@{/admin/users}" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Back</a>
      </div>
      <div class="card" style="max-width:600px">
        <div class="card-header"><h3 class="card-title"><i class="bi bi-person-plus"></i> User Details</h3></div>
        <div class="card-body">
          <div th:if="${errorMsg}" class="alert alert-danger mb-3">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMsg}"></span>
          </div>
          <form th:action="@{/admin/users/add}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">Username *</label>
                <input type="text" name="username" class="form-control" placeholder="e.g. john.doe" required minlength="3"/>
              </div>
              <div class="form-group">
                <label class="form-label">Role *</label>
                <select name="role" class="form-control">
                  <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name()=='ROLE_ADMIN'?'Administrator':'Staff'}"></option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Password *</label>
              <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6"/>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullName" class="form-control" placeholder="Full name"/>
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="email@company.com"/>
              </div>
            </div>
            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px">
              <a th:href="@{/admin/users}" class="btn btn-ghost">Cancel</a>
              <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create User</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: mobileOverlay}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
