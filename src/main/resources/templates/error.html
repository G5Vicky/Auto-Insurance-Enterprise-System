<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${errorTitle ?: 'Error'} + ' &mdash; InsureTrack'">Error</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);padding:40px 20px">

  <div style="text-align:center;max-width:480px">
    <div style="font-size:72px;color:var(--danger);margin-bottom:16px;opacity:.8">
      <i class="bi bi-shield-exclamation"></i>
    </div>
    <h1 style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:10px"
        th:text="${errorTitle ?: 'Something went wrong'}">Error</h1>
    <p style="font-size:14px;color:var(--text-m);margin-bottom:32px;line-height:1.7"
       th:text="${errorMessage ?: 'An unexpected error occurred. Please try again.'}">Error detail</p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="/" class="btn btn-primary btn-lg"><i class="bi bi-house"></i> Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-ghost btn-lg"><i class="bi bi-arrow-left"></i> Go Back</a>
    </div>
  </div>

  <div style="margin-top:60px;font-size:12px;color:var(--text-d)">
    InsureTrack Enterprise &mdash; &copy; 2025
  </div>

  <script th:src="@{/js/app.js}"></script>
</body>
</html>
