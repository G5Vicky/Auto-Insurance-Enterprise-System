<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pay Premium — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <style>
    @media(max-width:992px){#mobileMenuBtn{display:flex!important}#sidebarOverlay{display:block!important;opacity:0;pointer-events:none;transition:opacity .25s}#sidebarOverlay.show{opacity:1;pointer-events:all}}
    .due-summary{border-radius:12px;padding:18px 20px;background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.15);margin-top:16px;}
    .ds-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid rgba(0,0,0,.05);}
    .ds-row:last-child{border:none;padding-top:10px;font-size:16px;font-weight:700;}
    .blocked-box{border-radius:12px;padding:18px 20px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);margin-top:16px;}
  </style>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Pay Premium')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">

      <a th:href="@{/premium}" class="back-link"><i class="bi bi-arrow-left"></i> Back to Premium Dues</a>

      <div style="max-width:680px;margin:0 auto">
        <div class="page-header">
          <div class="page-header-left">
            <h1 th:text="${isAdvance} ? 'Advance Premium Payment' : 'Monthly Premium Payment'">Pay Premium</h1>
            <div class="subtitle" th:text="${isAdvance} ? 'Pay next month\'s premium in advance' : 'Record current month\'s premium'"></div>
          </div>
        </div>

        <!-- Flash -->
        <div th:if="${errorMsg}" class="alert alert-danger" style="margin-bottom:16px">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="${errorMsg}"></span>
        </div>

        <div class="card">
          <div class="card-body">

            <!-- Step 1: Find policy -->
            <div class="form-section">
              <div class="form-section-title"><i class="bi bi-search"></i> Step 1 — Find Policy</div>
              <div class="form-field">
                <label class="form-label">Policy ID <span class="req">*</span></label>
                <div class="input-group">
                  <input id="policyLookup" type="number" class="form-control"
                         placeholder="Enter Policy ID" min="1"
                         th:value="${prefillPolicyId}"/>
                  <button type="button" id="lookupBtn" class="btn btn-primary">
                    <i class="bi bi-search"></i> Lookup
                  </button>
                </div>
                <div id="lookupError" class="invalid-feedback" style="display:none"></div>
              </div>

              <!-- Policy preview card -->
              <div id="policyCard" style="display:none;margin-top:16px">
                <div class="policy-preview">
                  <div style="display:flex;justify-content:space-between;margin-bottom:12px">
                    <span style="font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.06em">Policy Found</span>
                    <span id="statusBadge" class="badge badge-success">Active</span>
                  </div>
                  <div class="policy-preview-grid">
                    <div><div class="ppg-label">Policy Name</div><div class="ppg-value fw-600" id="infoName"></div></div>
                    <div><div class="ppg-label">Holder</div><div class="ppg-value" id="infoHolder"></div></div>
                    <div><div class="ppg-label">Vehicle</div><div class="ppg-value mono fs-12" id="infoVehicle"></div></div>
                    <div><div class="ppg-label">Monthly Premium</div><div class="ppg-value big" id="infoMonthly"></div></div>
                    <div><div class="ppg-label">Due Day</div><div class="ppg-value" id="infoDueDay"></div></div>
                    <div><div class="ppg-label">Policy End</div><div class="ppg-value fs-12" id="infoEnd"></div></div>
                  </div>
                </div>

                <!-- Due summary -->
                <div class="due-summary" id="dueSummary" style="display:none">
                  <div style="font-weight:700;margin-bottom:10px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--primary)">
                    Payment Breakdown
                  </div>
                  <div class="ds-row"><span>Base Premium</span><span id="sumBase"></span></div>
                  <div class="ds-row" id="lateFeeRow"><span>Late Fee</span><span id="sumFee" style="color:#dc2626"></span></div>
                  <div class="ds-row" style="color:var(--primary)"><span>Total Due</span><span id="sumTotal"></span></div>
                </div>

                <!-- Blocked box for advance -->
                <div class="blocked-box" id="blockedBox" style="display:none">
                  <div style="display:flex;gap:10px;align-items:flex-start">
                    <i class="bi bi-lock-fill" style="color:#dc2626;font-size:20px"></i>
                    <div>
                      <div style="font-weight:700;color:#dc2626;margin-bottom:4px">Advance Payment Blocked</div>
                      <div style="font-size:13px;color:var(--text-m)" id="blockedReason"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Step 2: Confirm -->
            <div class="form-section" id="confirmSection" style="display:none">
              <div class="form-section-title"><i class="bi bi-check2-circle"></i> Step 2 — Confirm Payment</div>
              <form id="premiumForm" th:action="@{/premium/pay}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="policyId" id="formPolicyId" th:value="${prefillPolicyId}"/>
                <input type="hidden" name="isAdvance" id="formIsAdvance" th:value="${isAdvance}"/>
                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
                  <a th:href="@{/premium}" class="btn btn-ghost">Cancel</a>
                  <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" disabled>
                    <i class="bi bi-send"></i> Confirm &amp; Pay
                  </button>
                </div>
              </form>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
/*<![CDATA[*/
var IS_ADVANCE = /*[[${isAdvance}]]*/ false;
var prefillId  = /*[[${prefillPolicyId}]]*/ null;

if (prefillId) doLookup(prefillId);

document.getElementById('lookupBtn').addEventListener('click', function() {
  var id = document.getElementById('policyLookup').value;
  if (!id || isNaN(id) || Number(id) < 1) { showErr('Please enter a valid Policy ID.'); return; }
  doLookup(id);
});
document.getElementById('policyLookup').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('lookupBtn').click(); }
});

function showErr(msg) {
  var el = document.getElementById('lookupError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('policyCard').style.display = 'none';
  document.getElementById('confirmSection').style.display = 'none';
  document.getElementById('submitBtn').disabled = true;
}

function fmt(n) { return '₹' + parseFloat(n).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function doLookup(id) {
  document.getElementById('lookupError').style.display = 'none';
  document.getElementById('lookupBtn').innerHTML = '<i class="bi bi-hourglass-split"></i>';
  fetch('/premium/api/check?policyId=' + id + '&isAdvance=' + IS_ADVANCE)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      document.getElementById('lookupBtn').innerHTML = '<i class="bi bi-search"></i> Lookup';
      if (d.error) { showErr(d.error); return; }

      document.getElementById('infoName').textContent    = d.policyName   || '';
      document.getElementById('infoHolder').textContent  = d.policyHolderName || '';
      document.getElementById('infoVehicle').textContent = (d.vehicleModel || '') + (d.vehicleNumber ? ' (' + d.vehicleNumber + ')' : '');
      document.getElementById('infoMonthly').textContent = fmt(d.monthlyPremium || 0);
      document.getElementById('infoDueDay').textContent  = d.premiumDayOfMonth ? d.premiumDayOfMonth + 'th of each month' : '26th of each month';
      document.getElementById('infoEnd').textContent     = d.policyEndDate || '—';

      var badge = document.getElementById('statusBadge');
      badge.textContent = d.policyStatus;
      badge.className   = 'badge ' + (d.active ? 'badge-success' : 'badge-warning');

      document.getElementById('policyCard').style.display = 'block';
      document.getElementById('formPolicyId').value = id;

      var blocked = false;

      if (IS_ADVANCE) {
        if (!d.advanceAllowed) {
          document.getElementById('blockedBox').style.display = 'block';
          document.getElementById('blockedReason').textContent = d.blockReason || 'Current month dues are pending.';
          document.getElementById('dueSummary').style.display = 'none';
          blocked = true;
        } else {
          document.getElementById('blockedBox').style.display = 'none';
          document.getElementById('dueSummary').style.display = 'block';
          document.getElementById('sumBase').textContent  = fmt(d.monthlyPremium);
          document.getElementById('lateFeeRow').style.display = 'none';
          document.getElementById('sumTotal').textContent = fmt(d.monthlyPremium);
        }
      } else {
        document.getElementById('blockedBox').style.display = 'none';
        if (d.currentDueDate) {
          document.getElementById('dueSummary').style.display = 'block';
          document.getElementById('sumBase').textContent = fmt(d.currentPremium);
          if (d.currentLateFee > 0) {
            document.getElementById('lateFeeRow').style.display = 'flex';
            document.getElementById('sumFee').textContent = '+' + fmt(d.currentLateFee);
          } else {
            document.getElementById('lateFeeRow').style.display = 'none';
          }
          document.getElementById('sumTotal').textContent = fmt(d.currentTotalDue);
          if (d.currentPaid) {
            blocked = true;
            showErr('This policy\'s current month premium is already paid.');
          }
        }
      }

      document.getElementById('confirmSection').style.display = 'block';
      document.getElementById('submitBtn').disabled = blocked;
    })
    .catch(function() {
      document.getElementById('lookupBtn').innerHTML = '<i class="bi bi-search"></i> Lookup';
      showErr('Could not reach server.');
    });
}
/*]]>*/
</script>
</body>
</html>
