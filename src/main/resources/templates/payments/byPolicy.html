<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Policy Payments &mdash; InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
<style>@media(max-width:992px){#mobileMenuBtn{display:flex!important}#sidebarOverlay{display:block!important;opacity:0;pointer-events:none;transition:opacity .25s}#sidebarOverlay.show{opacity:1;pointer-events:all}}</style>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Policy Payments')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">
      <a th:href="@{/policies/{id}(id=${policyId})}" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Policy
      </a>
      <div class="page-header">
        <div class="page-header-left">
          <h1 th:if="${policy != null}" th:text="${policy.policyName}">Payments</h1>
          <h1 th:if="${policy == null}">Policy Payments</h1>
          <div class="subtitle" th:if="${policy != null}"
               th:text="${policy.policyHolderName} + ' &middot; ' + (${policy.vehicleNumber} ?: '')"></div>
        </div>
        <a th:href="@{/payments/make(policyId=${policyId})}" class="btn btn-primary">
          <i class="bi bi-send"></i> New Payment
        </a>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>Date</th><th>Amount</th><th>Status</th><th>Retries</th><th>Retry Of</th><th>Remarks</th><th>Actions</th>
            </tr></thead>
            <tbody>
              <tr th:each="p : ${payments}">
                <td class="td-id"><a th:href="@{/payments/{id}(id=${p.paymentId})}" th:text="'#'+${p.paymentId}"></a></td>
                <td th:text="${p.paymentDate}"></td>
                <td class="fw-600" th:text="'&#8377;' + ${#numbers.formatDecimal(p.paymentAmount,0,'COMMA',2,'POINT')}"></td>
                <td>
                  <span class="badge"
                    th:classappend="${p.paymentStatus.name()=='SUCCESS'}?'badge-success':(${p.paymentStatus.name()=='FAILED'}?'badge-danger':'badge-warning')"
                    th:text="${p.paymentStatus.label}"></span>
                </td>
                <td class="text-dim" th:text="${p.retryCount ?: 0}"></td>
                <td>
                  <a th:if="${p.retryOfPaymentId != null}"
                     th:href="@{/payments/{id}(id=${p.retryOfPaymentId})}"
                     th:text="'#' + ${p.retryOfPaymentId}" class="fs-12"></a>
                  <span th:if="${p.retryOfPaymentId == null}" class="text-dim">—</span>
                </td>
                <td class="fs-12 text-muted" th:text="${p.remarks ?: ''}"></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <a th:href="@{/payments/{id}(id=${p.paymentId})}" class="btn btn-ghost btn-icon" title="View">
                      <i class="bi bi-eye"></i></a>
                    <form th:if="${p.paymentStatus.name() == 'FAILED'}"
                          th:action="@{/payments/{id}/retry(id=${p.paymentId})}" method="post">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-ghost btn-icon" style="color:var(--warning)">
                        <i class="bi bi-arrow-clockwise"></i></button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="8">
                  <div class="empty-state">
                    <i class="bi bi-receipt"></i>
                    <h3>No payments yet</h3>
                    <a th:href="@{/payments/make(policyId=${policyId})}" class="btn btn-primary btn-sm mt-2">Make First Payment</a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
