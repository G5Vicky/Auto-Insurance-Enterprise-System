<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Failed Payments — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Reports: Failed Payments')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">

      <div th:if="${successMsg}" class="alert alert-success" data-auto-dismiss="1">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMsg}"></span>
        <button class="alert-close"><i class="bi bi-x"></i></button>
      </div>

      <div class="page-header">
        <div class="page-header-left">
          <h1>Failed Payments</h1>
          <div class="subtitle" th:text="${#lists.size(failedPayments)} + ' failed transactions found'"></div>
        </div>
      </div>

      <div class="sub-tabs">
        <a th:href="@{/reports/expiry}" class="sub-tab" th:classappend="${activeReport=='expiry'}?' active':''">
          <i class="bi bi-calendar-x"></i> Expiring</a>
        <a th:href="@{/reports/revenue}" class="sub-tab" th:classappend="${activeReport=='revenue'}?' active':''">
          <i class="bi bi-currency-rupee"></i> Revenue</a>
        <a th:href="@{/reports/failed}" class="sub-tab" th:classappend="${activeReport=='failed'}?' active':''">
          <i class="bi bi-exclamation-triangle"></i> Failed</a>
      </div>

      <div th:if="${not #lists.isEmpty(failedPayments)}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <strong th:text="${#lists.size(failedPayments)}"></strong> failed payments detected. Retry individually or contact the policy holders.
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>Date</th><th>Policy</th><th>Holder</th><th>Amount</th><th>Reason</th><th>Retries</th><th>Actions</th>
            </tr></thead>
            <tbody>
              <tr th:each="p : ${failedPayments}">
                <td class="td-id"><a th:href="@{/payments/{id}(id=${p.paymentId})}" th:text="'#'+${p.paymentId}"></a></td>
                <td th:text="${p.paymentDate}"></td>
                <td th:if="${p.policy != null}"><a th:href="@{/policies/{id}(id=${p.policy.policyId})}" th:text="${p.policy.policyName}" class="td-em"></a></td>
                <td th:if="${p.policy == null}" class="text-dim">—</td>
                <td th:text="${p.policy != null ? p.policy.policyHolderName : '—'}"></td>
                <td class="fw-600" th:text="'₹' + ${#numbers.formatDecimal(p.paymentAmount,0,'COMMA',2,'POINT')}"></td>
                <td class="fs-12 text-muted" th:text="${p.remarks ?: 'Unknown reason'}"></td>
                <td th:text="${p.retryCount ?: 0}"></td>
                <td>
                  <div style="display:flex;gap:4px;align-items:center">
                    <a th:href="@{/payments/{id}(id=${p.paymentId})}" class="btn btn-ghost btn-sm" title="View"><i class="bi bi-eye"></i></a>
                    <form th:action="@{/payments/{id}/retry(id=${p.paymentId})}" method="post" style="display:inline">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-warning btn-sm"><i class="bi bi-arrow-clockwise"></i> Retry</button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(failedPayments)}">
                <td colspan="8">
                  <div class="empty-state">
                    <div class="empty-icon"><i class="bi bi-check-circle" style="color:var(--success)"></i></div>
                    <div class="empty-title">No Failed Payments</div>
                    <div class="empty-sub">Everything is running smoothly.</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
