<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expiring Policies — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Reports: Expiring')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">

      <div class="page-header">
        <div class="page-header-left">
          <h1>Expiring Policies</h1>
          <div class="subtitle" th:text="${#lists.size(expiringPolicies)} + ' policies expiring within ' + ${days} + ' days'"></div>
        </div>
      </div>

      <div class="sub-tabs">
        <a th:href="@{/reports/expiry}" class="sub-tab" th:classappend="${activeReport=='expiry'}?' active':''">
          <i class="bi bi-calendar-x"></i> Expiring</a>
        <a th:href="@{/reports/revenue}" class="sub-tab" th:classappend="${activeReport=='revenue'}?' active':''">
          <i class="bi bi-currency-rupee"></i> Revenue</a>
        <a th:href="@{/reports/failed}" class="sub-tab" th:classappend="${activeReport=='failed'}?' active':''">
          <i class="bi bi-exclamation-triangle"></i> Failed</a>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <a th:href="@{/reports/expiry(days=15)}" class="btn" th:classappend="${days==15}?' btn-primary':' btn-ghost'">15 days</a>
        <a th:href="@{/reports/expiry(days=30)}" class="btn" th:classappend="${days==30}?' btn-primary':' btn-ghost'">30 days</a>
        <a th:href="@{/reports/expiry(days=60)}" class="btn" th:classappend="${days==60}?' btn-primary':' btn-ghost'">60 days</a>
        <a th:href="@{/reports/expiry(days=90)}" class="btn" th:classappend="${days==90}?' btn-primary':' btn-ghost'">90 days</a>
      </div>

      <div th:if="${not #lists.isEmpty(expiringPolicies)}" class="alert alert-warning">
        <i class="bi bi-calendar-exclamation-fill"></i>
        <strong th:text="${#lists.size(expiringPolicies)}"></strong> policies expiring in the next <strong th:text="${days}"></strong> days. Contact holders to renew.
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Policy</th><th>Holder</th><th>Vehicle</th><th>End Date</th>
              <th>Days Left</th><th>Premium</th><th>Coverage</th><th>Actions</th>
            </tr></thead>
            <tbody>
              <!-- Use server-pre-computed rows to avoid T() SpEL and NPE -->
              <tr th:each="row : ${expiringRows}">
                <td><a th:href="@{/policies/{id}(id=${row.policy.policyId})}" th:text="${row.policy.policyName}" class="td-em"></a></td>
                <td th:text="${row.policy.policyHolderName}"></td>
                <td>
                  <div class="mono fs-12" th:text="${row.policy.vehicleNumber ?: '—'}"></div>
                  <div class="fs-12 text-dim" th:text="${row.policy.vehicleModel ?: ''}"></div>
                </td>
                <td th:text="${row.policy.policyEndDate}"></td>
                <td>
                  <span class="badge"
                    th:classappend="${row.urgency == 'danger'} ? 'badge-danger' : (${row.urgency == 'warning'} ? 'badge-warning' : 'badge-info')"
                    th:text="${row.daysLeft} + ' days'"></span>
                </td>
                <td class="fw-600" th:text="'₹' + ${#numbers.formatDecimal(row.policy.policyAmount,0,'COMMA',0,'POINT')}"></td>
                <td class="fs-12" th:text="${row.policy.coverageType ?: '—'}"></td>
                <td>
                  <div style="display:flex;gap:4px">
                    <a th:href="@{/policies/{id}(id=${row.policy.policyId})}" class="btn btn-ghost btn-icon" title="View Policy"><i class="bi bi-eye"></i></a>
                    <a th:href="@{/payments/make(policyId=${row.policy.policyId})}" class="btn btn-primary btn-sm" title="Make Payment"><i class="bi bi-send"></i></a>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(expiringRows)}">
                <td colspan="8">
                  <div class="empty-state">
                    <div class="empty-icon"><i class="bi bi-calendar-check" style="color:var(--success)"></i></div>
                    <div class="empty-title">All Clear!</div>
                    <div class="empty-sub">No policies expiring within <span th:text="${days}"></span> days.</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
