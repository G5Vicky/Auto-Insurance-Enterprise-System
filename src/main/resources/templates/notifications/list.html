<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Notifications — InsureTrack</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/navbar :: sidebar}"></div>
  <div class="main-wrap">
    <div th:replace="~{fragments/footer :: topbar('Notifications')}"></div>
    <div th:replace="~{fragments/footer :: overlay}"></div>
    <main class="main-content">

      <div th:if="${successMsg}" class="alert alert-success alert-dismissible mb-4">
        <i class="bi bi-check-circle"></i> <span th:text="${successMsg}"></span>
        <button class="alert-close" data-dismiss-alert>&#x2715;</button>
      </div>

      <div class="page-header mb-4">
        <div>
          <h1 class="page-title">Notifications</h1>
          <p class="page-sub" th:text="${unreadCount} + ' unread notification(s)'"></p>
        </div>
        <form th:action="@{/notifications/mark-all-read}" method="post" style="display:inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-ghost"><i class="bi bi-check2-all"></i> Mark All Read</button>
        </form>
      </div>

      <div class="card">
        <div class="notif-list" th:if="${!notifications.isEmpty()}">
          <div th:each="n : ${notifications}"
               class="notif-item"
               th:classappend="${!n.read}?' unread':''">
            <div class="notif-icon"
                 th:classappend="${n.type.name()=='EXPIRY_WARNING'}?' notif-warning':
                                 (${n.type.name()=='PAYMENT_FAILED'}?' notif-danger':
                                 (${n.type.name()=='PAYMENT_SUCCESS'}?' notif-success':
                                 ' notif-info'))">
              <i class="bi"
                 th:classappend="${n.type.name()=='EXPIRY_WARNING'}?' bi-calendar-x':
                                 (${n.type.name()=='PAYMENT_FAILED'}?' bi-exclamation-circle':
                                 (${n.type.name()=='PAYMENT_SUCCESS'}?' bi-check-circle':
                                 (${n.type.name()=='POLICY_CREATED'}?' bi-file-earmark-plus':
                                 ' bi-bell')))"></i>
            </div>
            <div class="notif-content">
              <div class="notif-title" th:text="${n.title}"></div>
              <div class="notif-msg" th:text="${n.message}"></div>
              <div class="notif-time" th:text="${n.createdAt}"></div>
            </div>
            <div class="notif-dot" th:if="${!n.read}"></div>
          </div>
        </div>
        <div th:if="${notifications.isEmpty()}" class="empty-state">
          <div class="empty-icon"><i class="bi bi-bell-slash"></i></div>
          <div class="empty-title">No Notifications</div>
          <div class="empty-sub">All caught up! No alerts at this time.</div>
        </div>
      </div>
    </main>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
