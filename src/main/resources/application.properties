spring.application.name=autoinsurance-platform

# ═══════════════════════════════════════════════════════════════
#  ACTIVE PROFILE
#  Locally (default) → local  (file-based H2 — data persists across restarts)
#  To use MySQL locally → set SPRING_PROFILES_ACTIVE=mysql
#  On Render           → set SPRING_PROFILES_ACTIVE=postgres
#                         and JDBC_DATABASE_URL to your Neon/Render PostgreSQL URL
# ═══════════════════════════════════════════════════════════════
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Server ──────────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# ── Thymeleaf ───────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.insurance=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
